name: Build the Services

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    # Reference the reusable template. In another repository replace the
    # path prefix with: <org>/<repo>/.github/workflows/build-template.yml@main
    uses: ./.github/workflows/build-template.yml
    with:
      services: '["department-service","employee-service","organization-service","gateway-service"]'
      java-version: '25'
    secrets:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
